<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Profile Modification</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card p-4 shadow-sm" style="max-width: 450px;">
        <h4>Modify Voter Information Profile</h4>
        <hr>
        <form th:action="@{/profile/update}" th:object="${user}" method="POST">
            <div class="mb-3">
                <label class="form-label">Email Handle (Identity Key)</label>
                <input type="email" class="form-control bg-body-secondary" th:value="${user.email}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Update Legal Name</label>
                <input type="text" name="name" class="form-control" th:value="${user.name}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Change Password Sequence</label>
                <input type="password" name="password" class="form-control" th:value="${user.password}" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">Save Profile Updates</button>
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Profile - SmartVote Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; }
        .register-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); width: 100%; max-width: 440px; padding: 45px 40px; }
        .toggle-btn-container { background: #f1f5f9; border-radius: 30px; padding: 4px; display: flex; margin-bottom: 30px; }
        .toggle-btn { flex: 1; border: none; border-radius: 25px; padding: 10px; font-size: 14px; font-weight: 700; background: transparent; color: #64748b; text-decoration: none; text-align: center; transition: all 0.2s ease; }
        .toggle-btn.active { background: #0d6efd; color: #ffffff; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); }
        .form-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-control { background: #ffffff; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px 16px; color: #334155; font-size: 15px; }
        .form-control:focus { background: #ffffff; border-color: #0d6efd; box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15); }
        .btn-primary-custom { background: #0d6efd; border: none; color: #ffffff; border-radius: 12px; padding: 14px; font-weight: 600; font-size: 16px; width: 100%; transition: all 0.2s; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); }
        .btn-primary-custom:hover { background: #0b5ed7; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="register-card text-center">
        <h3 class="fw-bold text-dark mb-1">Create Voter Profile</h3>
        <p class="text-muted small mb-4">Join to participate in ongoing secure elections.</p>

        <div class="toggle-btn-container">
            <a href="/" class="toggle-btn"><i class="fa-solid fa-right-to-bracket me-1"></i> SIGN IN</a>
            <a href="/register" class="toggle-btn active"><i class="fa-solid fa-user-plus me-1"></i> REGISTER</a>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="POST" class="text-start">
            <div th:if="${error}" class="alert alert-danger py-2 small mb-3 text-start rounded-3" th:text="${error}"></div>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Create Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary-custom">Register Profile</button>
        </form>
    </div>

</body>
</html>
